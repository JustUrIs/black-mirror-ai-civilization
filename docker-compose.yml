services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./maps:/app/maps:ro
      - ./seeds:/app/seeds:ro
      - ./prompts:/app/prompts:ro
      - ./artifacts:/app/artifacts
    env_file:
      - .env
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
